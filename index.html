<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>three_vite</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="./main.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* ── Retro 32-bit start screen ────────────────────────── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0d0d2b;
      /* scanline overlay */
      background-image:
        repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0, 0, 0, 0.25) 3px,
          rgba(0, 0, 0, 0.25) 4px);
      font-family: 'Press Start 2P', monospace;
      z-index: 999;
      overflow: hidden;
    }

    /* pixel-art star field */
    #start-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 47% 70%, #fff 0%, transparent 100%);
      pointer-events: none;
    }

    /* CRT vignette */
    #start-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
      pointer-events: none;
    }

    /* ── Title ───────────────────────────────────────────── */
    #start-screen h1 {
      position: relative;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #ffe000;
      text-shadow:
        4px 4px 0 #b86000,
        0 0 20px #ffaa00,
        0 0 40px #ff6600;
      text-align: center;
      line-height: 2;
      letter-spacing: 0.05em;
      animation: titlePulse 2s ease-in-out infinite;
      margin: 0 1rem;
    }

    @keyframes titlePulse {

      0%,
      100% {
        text-shadow: 4px 4px 0 #b86000, 0 0 20px #ffaa00, 0 0 40px #ff6600;
      }

      50% {
        text-shadow: 4px 4px 0 #b86000, 0 0 30px #ffcc00, 0 0 60px #ff9900;
      }
    }

    /* ── INSERT COIN blink ───────────────────────────────── */
    #insert-coin {
      font-size: 0.65rem;
      color: #00ffcc;
      letter-spacing: 0.1em;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ── PLAY button ─────────────────────────────────────── */
    #play-btn {
      display: none;
      /* hidden — replaced by difficulty buttons */
    }

    /* ── Difficulty panel ────────────────────────────────── */
    #difficulty-select {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      align-items: center;
      background: #0a0a1e;
      border: 3px solid #444488;
      box-shadow:
        inset 0 0 0 2px #0d0d2b,
        0 0 0 4px #444488,
        6px 6px 0 #000;
      padding: 1.5rem 2rem;
    }

    #difficulty-select::before {
      content: '── SELECT DIFFICULTY ──';
      font-size: 0.5rem;
      color: #8888cc;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .diff-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      width: 260px;
      padding: 0.7rem 1rem;
      background: #1a1a3e;
      color: #e0e0ff;
      border: none;
      outline: none;
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.04em;
      /* chunky pixel border */
      box-shadow:
        inset -3px -3px 0 #000,
        inset 3px 3px 0 #5555aa,
        4px 4px 0 #000;
      transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
      image-rendering: pixelated;
    }

    .diff-btn:hover {
      background: #2b2b6e;
      color: #ffe000;
      box-shadow:
        inset -3px -3px 0 #000,
        inset 3px 3px 0 #8888ff,
        4px 4px 0 #000;
    }

    .diff-btn:active {
      transform: translate(3px, 3px);
      box-shadow:
        inset -3px -3px 0 #5555aa,
        inset 3px 3px 0 #000,
        1px 1px 0 #000;
    }

    /* difficulty colour accents */
    .diff-btn[data-difficulty="easy"] {
      border-left: 4px solid #00cc44;
    }

    .diff-btn[data-difficulty="medium"] {
      border-left: 4px solid #ffcc00;
    }

    .diff-btn[data-difficulty="hard"] {
      border-left: 4px solid #ff2244;
    }

    .diff-btn[data-difficulty="endless"] {
      border-left: 4px solid #00ccff;
    }

    /* ── bottom copyright line ───────────────────────────── */
    #retro-footer {
      position: absolute;
      bottom: 1.2rem;
      font-size: 0.4rem;
      color: #444488;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <div id="start-screen">
    <h1>TIMOONZ<br>TINY STACK<br>GAME</h1>

    <span id="insert-coin">▶ INSERT COIN ◀</span>

    <button id="play-btn">▶ PLAY</button>

    <div id="difficulty-select">
      <button class="diff-btn" data-difficulty="easy">🟢 EASY &nbsp;&nbsp;&nbsp;— 5 LIVES, finger in the nose</button>
      <button class="diff-btn" data-difficulty="medium">🟡 MEDIUM — 3 LIVES, pieces spawn faster, take caution wet
        floor</button>
      <button class="diff-btn" data-difficulty="hard">🔴 HARDER &nbsp;&nbsp;&nbsp;— 3 LIFE, everythin' is bouncy and
        slippy</button>
      <button class="diff-btn" data-difficulty="endless">♾️ ENDLESS — ∞ LIVES</button>
    </div>

    <span id="retro-footer">© 2026 LA TRONCHE STUDIOS &nbsp;·&nbsp; ALL RIGHTS RESERVED</span>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
